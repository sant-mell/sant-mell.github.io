# Netlify configuration for the Next.js static export.
# Build produces ./out (output: "export" in next.config.ts), which Netlify
# serves as a static site. Works alongside the GitHub Pages workflow.

[build]
  command = "npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "20"

# Static export already emits 404.html; let Netlify use it.
[[redirects]]
  from = "/*"
  to = "/404.html"
  status = 404
